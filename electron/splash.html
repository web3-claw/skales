<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skales</title>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 16px;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      background: linear-gradient(135deg, #0a0014 0%, #0d1117 50%, #020d1a 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* ── Logo (Angepasst für Bilder) ── */
    .logo {
      width: 130px; /* Perfekte Gorilla-Größe, anpassbar! */
      height: auto;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 24px rgba(74, 222, 128, 0.35));
      animation: pulse 2.4s ease-in-out infinite;
      object-fit: contain;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.3)); }
      50%       { filter: drop-shadow(0 0 36px rgba(74, 222, 128, 0.6)); }
    }

    /* ── Title ── */
    .title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* ── Status text ── */
    .status {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 12px;
      min-height: 18px;
    }

    /* ── Progress bar ── */
    .loader-track {
      width: 160px;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .loader-bar {
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      border-radius: 99px;
      animation: slide 1.6s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* HIER HATTE ICH DIE ANIMATION VERGESSEN! */
    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(340%); }
    }

    /* ── Version badge ── */
    .version {
      position: absolute;
      bottom: 14px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <img id="mascot" class="logo" src="" alt="Skales Mascot" />
  
  <div class="title">Skales</div>
  <div class="tagline">Your Local AI Agent</div>
  <div class="status" id="status">Starting your AI agent...</div>
  <div class="loader-track">
    <div class="loader-bar"></div>
  </div>
  <div class="version">v6.1.1</div>

  <script>
    // --- 1. RANDOM MASCOT LOGIC ---
    const mascots = ['mascot-1.png', 'mascot-2.png', 'mascot-3.png'];
    // If using JPG files instead, update the file extensions in the array below.
    const randomImage = mascots[Math.floor(Math.random() * mascots.length)];
    document.getElementById('mascot').src = randomImage;

    // --- 2. STATUS TEXT CYCLE LOGIC ---
    const messages = [
      'Starting your AI agent...',
      'Warming up the server...',
      'Loading Skales...',
      'Almost there...'
    ];
    let i = 0;
    const statusEl = document.getElementById('status');
    setInterval(() => {
      i = (i + 1) % messages.length;
      statusEl.textContent = messages[i];
    }, 2200);
  </script>
</body>
</html>
